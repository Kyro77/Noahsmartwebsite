<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="NSM.svg" type="image/svg+xml" />
</head>
<style>

.Inquireform {
    min-height: 100vh;
    display: flex;
    justify-content: center; /* vertical center */
    align-items: center;     /* horizontal center */
    flex-direction: column;
}

input{
    background-color: transparent;
    border: black 1px solid;
}



.form_info > * {
    margin-bottom: 20px;
}

.form-row {
    display: flex;
    gap: 20px;
}

.form-item {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.submitinquiry {
    margin-top: 10px;
}

h1{
    font-weight: 400;
    font-size: 1.5rem;
    margin-bottom: 1rem;
}

#notes {
    resize: none;
    background-color: transparent;

}

.submitinquiry{
    background-color: rgba(255, 255, 255, 0);
    padding: 10px 20px;
}


</style>
<body>

    
    
<div class="sidebar">
    <ul>
        <li><img src="/NSM.svg" alt="Logo" style="width:80px;"></li>
        <li><a href="/NSM/">NoahSmartMedia</a></li>
        <li><a href="/Contact/">Contact</a></li>
    </ul>
</div>

<div class="hint">NSM - 2023 - portfolio - <span><a href="https://www.instagram.com/noahsmartmedia/">Click for Instagram</a></span></div>



  <!-- Inquiry Form -->
   
  <main class="Inquireform">
    <h1>Contact</h1>
    <div>
    
    <form id="inquiryForm" class="form_info" method="POST">
      <div class="form-row">
        <div class="form-item">
          <label for="name">Your Name:</label>
          <input type="text" id="name" name="name" required autocomplete="name" />
        </div>

        <div class="form-item">
          <label for="phone">Telephone:</label>
          <input type="tel" id="phone" name="phone" autocomplete="tel" />
        </div>
      </div>

      <div class="form-item">
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required autocomplete="email" />
      </div>

     
      <div class="form-item">
        <label for="notes">Details:</label>
        <textarea id="notes" name="notes" rows="8"  required></textarea>
      </div>

      <!-- Honeypot field for spam bots -->
      <input type="text" name="_gotcha" style="display:none" aria-hidden="true" />

      <button class="submitinquiry" type="submit" id="submitButton">Submit </button>
    </form>
    </div>
  </main>
    
</body>

<script>
if (window.innerWidth <= 768) { // only run on mobile
    const sidebar = document.querySelector('.sidebar');
    let touchStartX = 0;
    let touchEndX = 0;

    document.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
    });

    document.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].clientX;
        if (Math.abs(touchEndX - touchStartX) < 10) {
            sidebar.style.display = sidebar.style.display === 'none' ? 'block' : 'none';
        }
    });

    document.addEventListener('touchmove', (e) => {
        let moveX = e.touches[0].clientX;
        if (moveX - touchStartX > 50) {
            sidebar.style.display = 'block';
        }
    });
}
</script>



</html>
